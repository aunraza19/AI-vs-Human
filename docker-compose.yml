services:
  livekit:
    image: livekit/livekit-server:v1.10
    command:
      - --dev
      - --bind
      - 0.0.0.0
      - --node-ip
      - ${LIVEKIT_NODE_IP:-127.0.0.1}
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-replace-with-32-char-secret}"
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - uvicorn
      - app.api:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    environment:
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://localhost:7880}
      LIVEKIT_SERVER_URL: ${LIVEKIT_SERVER_URL:-ws://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-replace-with-32-char-secret}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      AGENT_NAME: ${AGENT_NAME:-debate-agent}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-live-preview}
      GEMINI_VOICE: ${GEMINI_VOICE:-Puck}
      MAX_HUMAN_TURNS: ${MAX_HUMAN_TURNS:-8}
    ports:
      - "8000:8000"
    depends_on:
      - livekit
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - python
      - -m
      - app.worker
      - start
    environment:
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://localhost:7880}
      LIVEKIT_SERVER_URL: ${LIVEKIT_SERVER_URL:-ws://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-replace-with-32-char-secret}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      AGENT_NAME: ${AGENT_NAME:-debate-agent}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-live-preview}
      GEMINI_VOICE: ${GEMINI_VOICE:-Puck}
      MAX_HUMAN_TURNS: ${MAX_HUMAN_TURNS:-8}
    depends_on:
      - livekit
    restart: unless-stopped
